<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0c0d12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>

  <!-- Pulse waveform bars (heart-rate style) -->
  <g filter="url(#glow)" stroke="url(#iconGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Flat line left -->
    <polyline points="10,50 26,50 32,32 38,68 44,42 50,58 56,36 62,64 68,50 90,50"/>
  </g>

  <!-- Center pulse dot -->
  <circle cx="50" cy="50" r="4" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="2" fill="#a5b4fc"/>
</svg>
